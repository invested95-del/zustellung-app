<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <meta name="theme-color" content="#111827"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Zustellung"/>
  <link rel="apple-touch-icon" href="icon.png"/>
  <title>Zustellung</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{background:#f5f5f5;font-family:'DM Mono','Courier New',monospace;overscroll-behavior:none}
    ::-webkit-scrollbar{width:3px}
    ::-webkit-scrollbar-track{background:#f5f5f5}
    ::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:2px}
    input{outline:none;font-family:inherit}
    button{font-family:inherit}

    /* ── Loading screen ── */
    #loading-screen{position:fixed;inset:0;background:#f5f5f5;display:flex;align-items:center;justify-content:center;z-index:999}
    .load-icon{font-size:36px;margin-bottom:12px;text-align:center}
    .load-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:900;color:#111827;text-align:center;letter-spacing:-.4px}
    .load-sub{font-size:10px;color:#9ca3af;letter-spacing:1.5px;text-align:center;margin-top:4px}
    .load-bar{width:200px;height:3px;background:#e5e7eb;border-radius:2px;overflow:hidden;margin:16px auto 0}
    .load-fill{height:100%;background:#6ee7b7;border-radius:2px;width:0;transition:width .4s ease}
    .load-msg{font-size:11px;color:#9ca3af;text-align:center;margin-top:8px;min-height:16px}

    /* ── Error screen ── */
    #error-screen{display:none;position:fixed;inset:0;background:#f5f5f5;align-items:center;justify-content:center;padding:24px;z-index:998}
    .err-card{background:#fff;border-radius:16px;padding:28px;max-width:360px;width:100%;border:1px solid #e5e7eb;box-shadow:0 2px 16px rgba(0,0,0,.06);text-align:center}
    .err-icon{font-size:32px;margin-bottom:12px}
    .err-title{font-size:14px;font-weight:700;color:#111827;margin-bottom:8px}
    .err-msg{font-size:11px;color:#6b7280;line-height:1.6;margin-bottom:16px}
    .err-btn{background:#111827;color:#fff;border:none;border-radius:10px;padding:11px 24px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}

    /* ── App ── */
    #app{display:none}

    /* Header */
    #header{background:#fff;border-bottom:1px solid #e5e7eb;padding:14px 14px 0;position:sticky;top:0;z-index:100;box-shadow:0 1px 8px rgba(0,0,0,.05)}
    .hdr-inner{max-width:560px;margin:0 auto}
    .hdr-top{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:8px}
    .hdr-left{flex:1;min-width:0}
    .hdr-title-row{display:flex;align-items:center;gap:8px}
    .hdr-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:#111827;letter-spacing:-.3px}
    .hdr-date{font-size:10px;color:#9ca3af;letter-spacing:.5px;margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .hdr-count{text-align:right;flex-shrink:0;margin-left:12px}
    .hdr-num{font-size:22px;font-weight:700;letter-spacing:-1px;line-height:1}
    .hdr-label{font-size:9px;color:#9ca3af;letter-spacing:.5px}
    .hdr-stops{font-size:9px;color:#d1d5db;margin-top:1px}
    .progress{height:3px;background:#f3f4f6;border-radius:2px;overflow:hidden;margin-bottom:10px}
    .progress-fill{height:100%;border-radius:2px;transition:width .5s ease}
    .search{width:100%;background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;padding:7px 12px;color:#111827;font-size:12px;margin-bottom:8px}
    .search::placeholder{color:#d1d5db}
    .street-bar{display:flex;gap:3px;flex-wrap:wrap;padding-bottom:9px;align-items:center}
    .str-label{font-size:9px;color:#d1d5db;letter-spacing:1px;margin-right:2px}
    .str-btn{min-width:28px;height:26px;padding:0 4px;border-radius:6px;font-size:11px;font-weight:500;border:1px solid #e5e7eb;cursor:pointer;position:relative;transition:all .12s;font-family:inherit}
    .str-btn.done{text-decoration:line-through;color:#d1d5db;border-style:dashed;cursor:default}
    .str-btn.done::after{content:'✓';position:absolute;top:-4px;right:-4px;width:11px;height:11px;border-radius:50%;background:#16a34a;color:#fff;font-size:7px;display:flex;align-items:center;justify-content:center;font-weight:700;line-height:1}
    .str-btn.active{background:#111827;color:#fff;border-color:#111827;font-weight:700}
    .str-btn.has-items{background:#f3f4f6;color:#374151}
    .str-btn.done{background:#fafafa;color:#d1d5db}
    .clear-btn{padding:0 8px;height:26px;border-radius:6px;font-size:10px;background:#fee2e2;color:#dc2626;border:none;cursor:pointer;margin-left:2px}

    /* List */
    #list{max-width:560px;margin:0 auto;padding:10px 14px 70px}
    .section-hdr{display:flex;align-items:center;gap:10px;margin-bottom:8px;margin-top:14px}
    .section-hdr:first-child{margin-top:0}
    .section-label{min-width:30px;height:26px;padding:0 7px;border-radius:7px;background:#111827;color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;flex-shrink:0}
    .section-line{flex:1;height:1px;background:#e5e7eb}
    .street-name{font-size:9px;letter-spacing:2px;color:#9ca3af;text-transform:uppercase;margin-bottom:4px;padding-left:2px}
    .addr-card{position:relative;overflow:hidden;margin-bottom:5px;border-radius:10px}
    .addr-inner{background:#fff;border:1px solid #e5e7eb;border-radius:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.05);transition:transform .3s ease-in,opacity .3s}
    .addr-inner.exit{transform:translateX(110%);opacity:0}
    .addr-head{background:#f9fafb;padding:5px 8px 5px 12px;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;justify-content:space-between}
    .addr-nr{font-size:14px;font-weight:700;color:#111827;letter-spacing:-.3px}
    .alldone-btn{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:7px;padding:4px 10px;font-size:11px;font-weight:700;color:#16a34a;cursor:pointer;flex-shrink:0}
    .stg-hdr{display:flex;align-items:center;gap:8px;padding:4px 12px;border-top:1px solid #f3f4f6;border-left-width:4px;border-left-style:solid}
    .stg-label{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
    .row-wrap{position:relative;overflow:hidden;border-bottom:1px solid #f3f4f6}
    .row-wrap:last-child{border-bottom:none}
    .row-reveal{position:absolute;inset:0;background:linear-gradient(90deg,#dcfce7,#bbf7d0);display:flex;align-items:center;padding-left:14px;opacity:0;transition:opacity .12s}
    .row-reveal span{font-size:12px;font-weight:700;color:#166534}
    .row{display:flex;align-items:center;gap:8px;padding:9px 12px;background:#fff;cursor:grab;user-select:none;touch-action:pan-y;transition:transform .2s cubic-bezier(.34,1.4,.64,1)}
    .row.exit{transition:transform .27s ease-in,opacity .27s;opacity:0;transform:translateX(110%)}
    .row-floor{font-size:11px;color:#9ca3af;min-width:44px;text-align:right;flex-shrink:0}
    .row-info{flex:1;font-size:11px;color:#6b7280;line-height:1.3}
    .pub-badge{border-radius:4px;padding:2px 6px;font-size:10px;font-weight:700;flex-shrink:0}
    .all-done{text-align:center;padding:48px 20px}
    .all-done-icon{font-size:52px;margin-bottom:16px;animation:pop .5s cubic-bezier(.34,1.6,.64,1)}
    @keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}
    .all-done-title{font-family:'Syne',sans-serif;font-size:24px;font-weight:900;color:#16a34a;letter-spacing:-.5px;margin-bottom:6px}
    .all-done-sub{font-size:11px;color:#9ca3af;letter-spacing:1px;margin-bottom:4px;text-transform:uppercase}
    .all-done-stats{font-size:12px;color:#6b7280;margin:12px 0 8px;line-height:1.7}
    .all-done-time{font-size:11px;color:#9ca3af}
    .reset-btn{background:#111827;color:#fff;border:none;border-radius:12px;padding:14px 36px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:.5px;margin-top:24px;box-shadow:0 4px 16px rgba(0,0,0,.12);display:block;width:100%;max-width:280px;margin-left:auto;margin-right:auto}
    .reset-btn:active{transform:scale(.97)}
    .no-entries{text-align:center;padding:60px;color:#d1d5db;font-size:12px}
    .hint-bar{position:fixed;bottom:0;left:0;right:0;background:linear-gradient(transparent,#f5f5f5 55%);padding:18px 0 8px;text-align:center;pointer-events:none}
    .hint-bar span{font-size:9px;color:#d1d5db;letter-spacing:1.5px}

    /* Staircase colours */
    .stg-0{border-left-color:#3b82f6;background:#eff6ff}.stg-0 .stg-label{color:#1d4ed8}
    .stg-1{border-left-color:#f59e0b;background:#fffbeb}.stg-1 .stg-label{color:#92400e}
    .stg-2{border-left-color:#10b981;background:#ecfdf5}.stg-2 .stg-label{color:#065f46}
    .stg-3{border-left-color:#8b5cf6;background:#f5f3ff}.stg-3 .stg-label{color:#5b21b6}
    .stg-4{border-left-color:#ef4444;background:#fef2f2}.stg-4 .stg-label{color:#991b1b}
    .stg-5{border-left-color:#06b6d4;background:#ecfeff}.stg-5 .stg-label{color:#0e7490}

    @keyframes fadeUp{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
    .fade-up{animation:fadeUp .2s ease both}
  </style>
</head>
<body>

<!-- Loading -->
<div id="loading-screen">
  <div>
    <div class="load-icon">📰</div>
    <div class="load-title">ZUSTELLUNG</div>
    <div class="load-sub">NEWSPAPER DELIVERY</div>
    <div class="load-bar"><div class="load-fill" id="load-fill"></div></div>
    <div class="load-msg" id="load-msg">Loading today's list…</div>
  </div>
</div>

<!-- Error -->
<div id="error-screen" style="display:none">
  <div class="err-card">
    <div class="err-icon">⚠️</div>
    <div class="err-title" id="err-title">Could not load list</div>
    <div class="err-msg" id="err-msg"></div>
    <button class="err-btn" onclick="location.reload()">Try again</button>
  </div>
</div>

<!-- App -->
<div id="app">
  <div id="header">
    <div class="hdr-inner">
      <div class="hdr-top">
        <div class="hdr-left">
          <div class="hdr-title-row">
            <div class="hdr-title">ZUSTELLUNG</div>
          </div>
          <div class="hdr-date" id="hdr-date"></div>
        </div>
        <div class="hdr-count">
          <div class="hdr-num" id="hdr-num">0</div>
          <div class="hdr-label">PAPERS LEFT</div>
          <div class="hdr-stops" id="hdr-stops"></div>
        </div>
      </div>
      <div class="progress"><div class="progress-fill" id="progress-fill"></div></div>
      <input class="search" type="text" placeholder="Street or number…" id="search-input" oninput="renderList()"/>
      <div class="street-bar" id="street-bar"></div>
    </div>
  </div>
  <div id="list"></div>
  <div class="hint-bar"><span>→ SWIPE RIGHT = DONE</span></div>
</div>

<script>
// ── Config ────────────────────────────────────────────────────────────────────
// The CSV file lives in the same GitHub repo as this HTML
// Use the raw content URL — auto-constructed from current page location
function getCSVUrl() {
  const loc = window.location.href;
  // If on GitHub Pages: https://user.github.io/repo/index.html
  // Raw CSV: https://raw.githubusercontent.com/user/repo/main/list.csv
  // Extract user and repo from pages URL
  const m = loc.match(/https:\/\/([^.]+)\.github\.io\/([^/]+)\//);
  if (m) {
    return `https://raw.githubusercontent.com/${m[1]}/${m[2]}/main/list.csv`;
  }
  // Fallback: same directory as HTML (for local testing)
  return './list.csv';
}

// ── Constants ──────────────────────────────────────────────────────────────────
const STORE_KEY = 'zustellung:state';
const SWIPE_THR = 82;

const PUB_COLORS = {
  'KRONE':           {bg:'#fee2e2',text:'#b91c1c'},
  'DIE PRESSE':      {bg:'#eff6ff',text:'#1d4ed8'},
  'Kurier':          {bg:'#fffbeb',text:'#b45309'},
  'KLEINE ZTG':      {bg:'#ecfdf5',text:'#065f46'},
  'KLEINE ZTG/ENNS': {bg:'#ecfdf5',text:'#065f46'},
  'DER STANDARD':    {bg:'#f0fdf4',text:'#15803d'},
  'STANDARDKOMPAT':  {bg:'#dcfce7',text:'#166534'},
  'PROFIL':          {bg:'#fdf4ff',text:'#7e22ce'},
  'SN':              {bg:'#fff7ed',text:'#c2410c'},
  'OE-B':            {bg:'#f0f9ff',text:'#0369a1'},
  'SUEDD. ZTG.':     {bg:'#fafaf9',text:'#44403c'},
  'FRKFT.ALLG.ZTG':  {bg:'#fafaf9',text:'#57534e'},
  'OOEN':            {bg:'#f0fdfa',text:'#0f766e'},
};
const PUB_SHORT = {
  'KRONE':'KR','DIE PRESSE':'PR','Kurier':'KU','KLEINE ZTG':'KL','KLEINE ZTG/ENNS':'KL',
  'DER STANDARD':'DS','STANDARDKOMPAT':'SK','PROFIL':'PF','SN':'SN','OE-B':'OB',
  'SUEDD. ZTG.':'SZ','FRKFT.ALLG.ZTG':'FA','OOEN':'OO',
};
const CUSTOM_LABELS = {
  'Weinberggasse':'WEN','Weimarer Straße':'WM','Billrothstraße':'BI','Blaasstraße':'BL',
  'Felix-Mottl-Straße':'FE','Friedlgasse':'FR','Gregor-Mendel-Straße':'GM',
  'Gustav-Tschermak-Gasse':'GT','Gymnasiumstraße':'GY','Hasenauerstraße':'HA',
  'Hutweidengasse':'HU','Lannerstraße':'LA','Leidesdorfgasse':'LE','Linneplatz':'LI',
  'Sieveringer Straße':'SI','Sonnbergplatz':'SO','Peter-Jordan-Straße':'PJ',
};
const STG_COLORS = [
  {bg:'#eff6ff',border:'#3b82f6',text:'#1d4ed8'},
  {bg:'#fffbeb',border:'#f59e0b',text:'#92400e'},
  {bg:'#ecfdf5',border:'#10b981',text:'#065f46'},
  {bg:'#f5f3ff',border:'#8b5cf6',text:'#5b21b6'},
  {bg:'#fef2f2',border:'#ef4444',text:'#991b1b'},
  {bg:'#ecfeff',border:'#06b6d4',text:'#0e7490'},
];

// ── State ──────────────────────────────────────────────────────────────────────
let allItems    = [];   // full original list
let items       = [];   // remaining items (not yet delivered)
let csvDate     = '';
let activeLabel = null;

// ── Load progress ──────────────────────────────────────────────────────────────
function setLoadProgress(pct, msg) {
  document.getElementById('load-fill').style.width = pct + '%';
  document.getElementById('load-msg').textContent = msg;
}

// ── CSV parser ─────────────────────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.split('\n').filter(l => l.trim());
  const rows = [];
  let headerIdx = -1;

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i].trim();
    if (line.startsWith('#')) {
      // Extract date from comment
      const dm = line.match(/(\d{2}\.\d{2}\.\d{4})/);
      if (dm) csvDate = dm[1];
      continue;
    }
    if (line.startsWith('id,')) { headerIdx = i; continue; }
    if (headerIdx < 0) continue;
    // Parse CSV row (handles quoted values)
    const parts = parseCSVRow(line);
    if (parts.length < 7) continue;
    rows.push({
      id:        parseInt(parts[0]) || rows.length + 1,
      street:    parts[1] || '',
      nr:        parts[2] || '',
      stiege:    parts[3] || '.',
      floor:     parts[4] || '.',
      placement: parts[5] || '',
      pub:       parts[6] || '',
      qty:       parseInt(parts[7]) || 1,
    });
  }
  return rows.filter(r => r.street && r.pub);
}

function parseCSVRow(line) {
  const result = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') {
      if (inQ && line[i+1] === '"') { cur += '"'; i++; }
      else inQ = !inQ;
    } else if (c === ',' && !inQ) {
      result.push(cur); cur = '';
    } else cur += c;
  }
  result.push(cur);
  return result;
}

// ── Label builder ──────────────────────────────────────────────────────────────
function getLabel(street) {
  if (CUSTOM_LABELS[street]) return CUSTOM_LABELS[street];
  return street[0].toUpperCase();
}

function buildLabelMap(streets) {
  const map = {}, used = {};
  for (const s of streets) {
    if (CUSTOM_LABELS[s]) { map[s] = CUSTOM_LABELS[s]; continue; }
    const c = s[0].toUpperCase();
    if (!used[c]) { map[s] = c; used[c] = [s]; }
    else { used[c].push(s); }
  }
  for (const [,list] of Object.entries(used)) {
    if (list.length > 1) {
      for (const s of list) map[s] = s.slice(0,2).toUpperCase().replace(/[^A-Z]/,'') || s[0];
      const tm = {};
      for (const s of list) { const l=map[s]; if(!tm[l]) tm[l]=[s]; else tm[l].push(s); }
      for (const [l,ss] of Object.entries(tm)) if(ss.length>1) ss.forEach((s,i)=>{map[s]=l+(i+1);});
    }
  }
  return map;
}

// ── Staircase colour map ────────────────────────────────────────────────────────
function buildStgMap(items) {
  const addrStgs = {};
  for (const d of items) {
    if (!d.stiege || d.stiege === '.') continue;
    const key = d.street + '||' + d.nr;
    if (!addrStgs[key]) addrStgs[key] = [];
    if (!addrStgs[key].includes(d.stiege)) addrStgs[key].push(d.stiege);
  }
  const result = {};
  for (const [key, stgs] of Object.entries(addrStgs)) {
    if (stgs.length > 1) { result[key] = {}; stgs.forEach((s,i)=>{result[key][s]=i%STG_COLORS.length;}); }
  }
  return result;
}

// ── Persistence ─────────────────────────────────────────────────────────────────
function saveState() {
  try {
    const doneIds = new Set(allItems.map(d=>d.id)).size > 0
      ? allItems.filter(d => !items.find(r=>r.id===d.id)).map(d=>d.id)
      : [];
    localStorage.setItem(STORE_KEY, JSON.stringify({ doneIds, csvDate }));
  } catch {}
}

function loadSavedDone() {
  try {
    const s = localStorage.getItem(STORE_KEY);
    if (!s) return [];
    const obj = JSON.parse(s);
    // Only restore if same date
    if (obj.csvDate && obj.csvDate !== csvDate) return [];
    return obj.doneIds || [];
  } catch { return []; }
}

// ── Counters ───────────────────────────────────────────────────────────────────
function updateCounters() {
  const total = allItems.length;
  const remaining = items.length;
  const totalPapers = allItems.reduce((s,d)=>s+(d.qty||1),0);
  const remPapers = items.reduce((s,d)=>s+(d.qty||1),0);
  const pct = total > 0 ? Math.round((total-remaining)/total*100) : 0;

  document.getElementById('hdr-num').textContent = remPapers;
  document.getElementById('hdr-num').style.color = remaining === 0 ? '#16a34a' : '#111827';
  document.getElementById('hdr-stops').textContent = remaining + ' stops';
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-fill').style.background = pct === 100 ? '#16a34a' : '#6ee7b7';
}

// ── Delete items ───────────────────────────────────────────────────────────────
function removeIds(ids) {
  const s = new Set(ids);
  items = items.filter(d => !s.has(d.id));
  saveState();
  updateCounters();
  updateStreetBar();
}

// ── Street bar ─────────────────────────────────────────────────────────────────
let labelMap = {};
let allLabels = [];

function buildStreetBar() {
  const streets = [...new Set(allItems.map(d=>d.street))];
  labelMap = buildLabelMap(streets);
  allLabels = [...new Set(allItems.map(d=>labelMap[d.street]))].sort();
  updateStreetBar();
}

function updateStreetBar() {
  const remaining = new Set(items.map(d=>labelMap[d.street]));
  const bar = document.getElementById('street-bar');
  bar.innerHTML = '<span class="str-label">STR.</span>';

  for (const lbl of allLabels) {
    const has = remaining.has(lbl);
    const btn = document.createElement('button');
    btn.className = 'str-btn' + (lbl===activeLabel?' active':'') + (has?' has-items':' done');
    btn.textContent = lbl;
    btn.style.fontSize = lbl.length > 2 ? '8px' : lbl.length > 1 ? '10px' : '11px';
    btn.style.minWidth = lbl.length > 2 ? '34px' : lbl.length > 1 ? '30px' : '26px';
    if (has) {
      btn.onclick = () => {
        activeLabel = activeLabel === lbl ? null : lbl;
        updateStreetBar();
        renderList();
        // Scroll to section
        setTimeout(() => {
          const el = document.getElementById('sec-' + lbl);
          if (el) el.scrollIntoView({behavior:'smooth',block:'start'});
        }, 60);
      };
    }
    bar.appendChild(btn);
  }

  if (activeLabel) {
    const clr = document.createElement('button');
    clr.className = 'clear-btn';
    clr.textContent = '✕';
    clr.onclick = () => { activeLabel = null; updateStreetBar(); renderList(); };
    bar.appendChild(clr);
  }
}

// ── Render ─────────────────────────────────────────────────────────────────────
function renderList() {
  const search = document.getElementById('search-input').value.toLowerCase();
  const stgMap = buildStgMap(allItems);

  const filtered = items.filter(d => {
    if (activeLabel && labelMap[d.street] !== activeLabel) return false;
    if (search) return d.street.toLowerCase().includes(search) || d.nr.toLowerCase().includes(search);
    return true;
  });

  // Group: street → nr → items
  const streets = [...new Set(filtered.map(d=>d.street))].sort();
  const grouped = streets.map(street => {
    const byNr = {};
    for (const d of filtered.filter(d=>d.street===street)) {
      if (!byNr[d.nr]) byNr[d.nr] = [];
      byNr[d.nr].push(d);
    }
    const nrs = Object.keys(byNr).sort((a,b)=>(parseInt(a)||0)-(parseInt(b)||0));
    return { street, label: labelMap[street], nrs: nrs.map(nr=>({nr, rows:byNr[nr]})) };
  });

  const list = document.getElementById('list');

  if (items.length === 0) {
    const total = allItems.length;
    const totalPapers = allItems.reduce((s,d)=>s+(d.qty||1),0);
    const now = new Date();
    const timeStr = now.toLocaleTimeString('de-AT',{hour:'2-digit',minute:'2-digit'});
    list.innerHTML = `<div class="all-done">
      <div class="all-done-icon">🎉</div>
      <div class="all-done-title">All Done!</div>
      <div class="all-done-sub">Zustellung abgeschlossen</div>
      <div class="all-done-stats">
        <strong>${totalPapers}</strong> papers delivered<br/>
        <strong>${total}</strong> stops completed<br/>
        <strong>${csvDate}</strong>
      </div>
      <div class="all-done-time">Finished at ${timeStr}</div>
      <button class="reset-btn" onclick="resetProgress()">↺ Reset for tomorrow</button>
    </div>`;
    return;
  }
  if (filtered.length === 0) {
    list.innerHTML = '<div class="no-entries">No entries</div>';
    return;
  }

  let html = '';
  let curLabel = null;

  for (const { street, label, nrs } of grouped) {
    if (label !== curLabel) {
      curLabel = label;
      const fs = label.length > 2 ? '8px' : label.length > 1 ? '10px' : '13px';
      html += `<div class="section-hdr fade-up" id="sec-${label}">
        <div class="section-label" style="font-size:${fs}">${label}</div>
        <div class="section-line"></div>
      </div>`;
    }
    html += `<div class="street-name">${street}</div>`;

    for (const { nr, rows } of nrs) {
      const addrKey = street + '||' + nr;
      const stgColorIdx = stgMap[addrKey];
      const hasMultiStg = stgColorIdx && Object.keys(stgColorIdx).length > 1;

      // Group by stiege
      const byStg = {};
      for (const d of rows) {
        const k = (d.stiege && d.stiege !== '.') ? d.stiege : '__none__';
        if (!byStg[k]) byStg[k] = [];
        byStg[k].push(d);
      }
      const stgKeys = Object.keys(byStg);
      const allIds = rows.map(d=>d.id).join(',');

      html += `<div class="addr-card" id="addr-${nr.replace(/[^a-z0-9]/gi,'_')}-${street.replace(/[^a-z0-9]/gi,'_')}">
        <div class="addr-inner" id="inner-${allIds.split(',')[0]}">
          <div class="addr-head">
            <span class="addr-nr">${nr}</span>
            <button class="alldone-btn" onclick="markAllDone([${allIds}])">✓ All done</button>
          </div>`;

      for (const stg of stgKeys) {
        const stgRows = byStg[stg];
        const ci = hasMultiStg && stg !== '__none__' ? stgColorIdx[stg] : null;
        const sc = ci !== undefined ? STG_COLORS[ci] : null;

        if (hasMultiStg && stg !== '__none__') {
          html += `<div class="stg-hdr" style="border-left-color:${sc.border};background:${sc.bg}">
            <span class="stg-label" style="color:${sc.text}">Stiege ${stg}</span>
          </div>`;
        }

        for (let i = 0; i < stgRows.length; i++) {
          const d = stgRows[i];
          const isLast = i === stgRows.length-1 && stg === stgKeys[stgKeys.length-1];
          const pub = d.pub || '';
          const pc = PUB_COLORS[pub] || {bg:'#f3f4f6',text:'#374151'};
          const ps = PUB_SHORT[pub] || pub.slice(0,2).toUpperCase();
          const rowBg = sc ? sc.bg : '#fff';
          const rowBorder = sc ? `border-left:4px solid ${sc.border}` : 'border-left:4px solid transparent';
          const floor = (d.floor && d.floor !== '.') ? d.floor : '—';
          const info = d.placement + (d.stiege && d.stiege !== '.' ? ` · Stg. ${d.stiege}` : '') + (d.qty > 1 ? ` ×${d.qty}` : '');

          html += `<div class="row-wrap" style="${isLast?'border-bottom:none':''}" id="wrap-${d.id}">
            <div class="row-reveal" id="reveal-${d.id}"><span>✓ done</span></div>
            <div class="row" id="row-${d.id}" data-id="${d.id}"
              style="background:${rowBg};${rowBorder}"
              ontouchstart="swipeStart(event,${d.id})"
              ontouchmove="swipeMove(event,${d.id})"
              ontouchend="swipeEnd(event,${d.id})"
              onmousedown="swipeStart(event,${d.id})"
              onmousemove="swipeMove(event,${d.id})"
              onmouseup="swipeEnd(event,${d.id})"
              onmouseleave="swipeEnd(event,${d.id})">
              <span class="row-floor">${floor}</span>
              <span class="row-info">${escHtml(info)}</span>
              <span class="pub-badge" style="background:${pc.bg};color:${pc.text}">${ps}</span>
            </div>
          </div>`;
        }
      }
      html += `</div></div>`;
    }
  }

  list.innerHTML = html;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── All done button ────────────────────────────────────────────────────────────
function markAllDone(ids) {
  const firstId = ids[0];
  const inner = document.getElementById('inner-' + firstId);
  if (inner) {
    inner.classList.add('exit');
    setTimeout(() => { removeIds(ids); renderList(); }, 300);
  } else {
    removeIds(ids); renderList();
  }
}

// ── Swipe ──────────────────────────────────────────────────────────────────────
const swipeState = {};

function swipeStart(e, id) {
  const t = e.touches ? e.touches[0] : e;
  swipeState[id] = { sx: t.clientX, sy: t.clientY, axis: null, dx: 0, live: true };
}

function swipeMove(e, id) {
  const st = swipeState[id];
  if (!st || !st.live) return;
  const t = e.touches ? e.touches[0] : e;
  const dx = t.clientX - st.sx, dy = t.clientY - st.sy;
  if (!st.axis && (Math.abs(dx) > 5 || Math.abs(dy) > 5))
    st.axis = Math.abs(dx) >= Math.abs(dy) ? 'h' : 'v';
  if (st.axis !== 'h') return;
  e.preventDefault();
  st.dx = Math.max(0, Math.min(dx, SWIPE_THR * 1.6));
  const row = document.getElementById('row-' + id);
  const reveal = document.getElementById('reveal-' + id);
  if (row) row.style.transform = `translateX(${st.dx}px)`;
  if (reveal) reveal.style.opacity = Math.min(st.dx / SWIPE_THR, 1);
}

function swipeEnd(e, id) {
  const st = swipeState[id];
  if (!st || !st.live) return;
  st.live = false;
  if (st.dx >= SWIPE_THR) {
    const row = document.getElementById('row-' + id);
    const wrap = document.getElementById('wrap-' + id);
    if (row) { row.classList.add('exit'); row.style.transform = ''; }
    setTimeout(() => { removeIds([id]); renderList(); }, 270);
  } else {
    const row = document.getElementById('row-' + id);
    const reveal = document.getElementById('reveal-' + id);
    if (row) { row.style.transition='transform .2s cubic-bezier(.34,1.4,.64,1)'; row.style.transform=''; }
    if (reveal) reveal.style.opacity = 0;
  }
  delete swipeState[id];
}

// ── Main init ──────────────────────────────────────────────────────────────────
function resetProgress() {
  try { localStorage.removeItem(STORE_KEY); } catch {}
  items = [...allItems];
  activeLabel = null;
  updateCounters();
  updateStreetBar();
  renderList();
}

async function init() {
  setLoadProgress(10, 'Connecting to GitHub…');

  try {
    const csvUrl = getCSVUrl();
    setLoadProgress(30, 'Fetching list.csv…');

    const res = await fetch(csvUrl + '?t=' + Date.now()); // cache bust
    if (!res.ok) throw new Error(`Could not load list.csv (${res.status}). Make sure you uploaded it to GitHub.`);

    setLoadProgress(60, 'Parsing delivery list…');
    const text = await res.text();
    allItems = parseCSV(text);

    if (!allItems.length) throw new Error('list.csv is empty or has wrong format. Please re-generate it.');

    setLoadProgress(80, 'Restoring progress…');

    // Restore done items from localStorage (same date only)
    const doneIds = new Set(loadSavedDone());
    items = allItems.filter(d => !doneIds.has(d.id));

    setLoadProgress(95, 'Building delivery map…');
    document.getElementById('hdr-date').textContent = csvDate || new Date().toLocaleDateString('de-AT');
    buildStreetBar();
    updateCounters();

    setLoadProgress(100, 'Ready!');
    await new Promise(r => setTimeout(r, 300));

    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    renderList();

  } catch (err) {
    document.getElementById('loading-screen').style.display = 'none';
    const errScreen = document.getElementById('error-screen');
    errScreen.style.display = 'flex';
    document.getElementById('err-title').textContent = 'Could not load list';
    document.getElementById('err-msg').innerHTML = err.message + '<br/><br/>Make sure <strong>list.csv</strong> exists in your GitHub repo and GitHub Pages is enabled.';
  }
}

init();
</script>
